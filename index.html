<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Space</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Safe Space</h1>
        <nav>
            <ul>
                <li><a href="#authentication">Login/Signup</a></li>
                <li><a href="#chat">Chat with AI</a></li>
                <li><a href="#exercises">Breathing Exercises</a></li>
                <li><a href="#ambientsounds">Ambient Sounds</a></li>
                <li><a href="#diary">Diary</a></li>
            </ul>
        </nav>
    </header>

    <section id="authentication">
        <h2>Authentication</h2>
        <form action="#" method="POST">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
    </section>

    <section id="chat">
        <h2>Chat Interface</h2>
        <div id="chatbox"></div>
        <textarea id="userInput" placeholder="Type your message here..."></textarea>
        <button id="sendBtn">Send</button>
    </section>

    <section id="exercises">
        <h2>Breathing Exercises</h2>
        <p>Follow along to help relax.</p>
        <button id="breatheBtn">Start Breathing Exercise</button>
    </section>

    <section id="ambientsounds">
        <h2>Ambient Sounds</h2>
        <button id="playSound">Play Sounds</button>
    </section>

    <section id="diary">
        <h2>Your Diary</h2>
        <textarea id="diaryInput" placeholder="Write your thoughts here..."></textarea>
        <button id="saveDiary">Save</button>
    </section>

    <footer>
        <p>&copy; 2026 Safe Space, Inc.</p>
        <div>
            <button id="switchLang">Switch to Bilingual</button>
        </div>
    </footer>
    <script src="app.js"></script>
</body>
</html>
